<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点餐系统引导</title>
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f5f5f5; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; width: 80%; max-width: 300px; }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #333; }
        .btn { display: inline-block; padding: 15px 40px; background-color: #07c160; color: white; text-decoration: none; border-radius: 12px; font-size: 18px; font-weight: 500; transition: all 0.3s; }
        .tip { margin-top: 20px; color: #999; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">欢迎光临</div>
        <div id="status" style="margin-bottom: 20px; color: #666;">正在匹配时段服务...</div>
        <a id="jumpBtn" href="javascript:void(0);" class="btn">立即点餐</a>
        <div class="tip">如点击无反应<br>请重新扫码即可</div>
    </div>

    <script>
        const now = new Date();
        const hour = now.getHours();
        const ua = window.navigator.userAgent.toLowerCase();
        let targetUrl = "";

        // 识别平台与时间逻辑
        if (ua.indexOf('alipay') > -1) {
            targetUrl = "https://www.wmslz.com/s/E3dX7Dr82eN";
        } else {
            // 21点后切换到酒馆，其余时间餐厅
            if (hour >= 21 || hour < 4) {
                targetUrl = "weixin://dl/business/?t=CEP1Mq9Jrlgba9r";
            } else {
                targetUrl = "weixin://dl/business/?t=jVXITPXTkCjuPDf";
            }
        }

        const btn = document.getElementById('jumpBtn');
        const status = document.getElementById('status');

        if (targetUrl) {
            btn.href = targetUrl;
            status.innerHTML = (hour >= 21 || hour < 4) ? "当前为【酒馆时段】" : "当前为【餐饮时段】";
            
            // 尝试自动跳转一次
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 500);
        }
    </script>
</body>
</html>
